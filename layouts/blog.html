<main class="page">
  <h1>Blog</h1>
  <section class="blog-home-body">
    {{content}}
  </section>
  <div class="post-list">
    <!-- BLOG_ITEM -->
    <article class="post-card">
      <span class="date">{{date}}</span>
      <a class="title" href="/blog/{{slug}}">
        <h3>{{title}}</h3>
      </a>
    </article>
    <!-- /BLOG_ITEM -->
  </div>
</main>
